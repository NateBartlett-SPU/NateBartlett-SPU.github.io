<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friend Details</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">
  <div class="container mt-4">
    <h1 class="mb-4">Friend List</h1>

    

    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
        </tr>
      </thead>
      <tbody id="friendsTable"></tbody>
    </table>

    <div id="message" class="mt-3 fw-bold"></div>
  </div>

<script>
const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";

const tableBody = document.getElementById("friendsTable");
const messageDiv = document.getElementById("message");


function showMessage(msg) {
  messageDiv.textContent = msg;
}

function clearTable() {
  tableBody.innerHTML = "";
}

function createFriendRow(friend, index) {
  const row = document.createElement("tr");

  const collapseId = `collapse${index}`;

  row.innerHTML = `
    <td>
      <a class="text-primary" data-bs-toggle="collapse" href="#${collapseId}" role="button">
        ${friend.firstName} ${friend.lastName}
      </a>

      <div class="collapse mt-2" id="${collapseId}">
        <div class="card card-body">
          <strong>ID:</strong> ${friend.id}<br>
          <strong>First Name:</strong> ${friend.firstName}<br>
          <strong>Last Name:</strong> ${friend.lastName}<br>
          <strong>Phone:</strong> ${friend.phone}
        </div>
      </div>
    </td>
  `;

  tableBody.appendChild(row);
}

async function loadFriends() {
  clearTable();
  showMessage("Loading...");

  try {
    const response = await fetch(API_URL);

    if (!response.ok) {
      throw new Error(`HTTP error ${response.status}`);
    }

    const friends = await response.json();

    if (!friends.length) {
      showMessage("No friends found.");
      return;
    }

    friends.forEach((friend, index) => {
      createFriendRow(friend, index);
    });

    showMessage(`Loaded ${friends.length} friends.`);
  } catch (err) {
    showMessage("Error: " + err.message);
  }
}
document.addEventListener("DOMContentLoaded", loadFriends);

</script>

</body>
</html>
